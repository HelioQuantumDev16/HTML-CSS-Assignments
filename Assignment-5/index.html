<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laundry Mart Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <div
          class="log-img"
          style="background-image: url(&quot;./images/laundry.png&quot;)"
        >
          <!-- <img src="./images/laundry.png" alt="laundry Cover Image"> -->
        </div>
      </div>
      <div class="right">
        <header>
          <h1>Hello Again!</h1>
          <p>Welcome back!we miss you!</p>
        </header>

        <form action="#" class="login-form">
          <label for="username" class="label-txt">Email</label>
          <input
            type="email"
            id="username"
            class="txt-box"
            placeholder="Emailid@site.com"
          />

          <label for="password" class="label-txt">Password</label>
          <input
            type="password"
            id="password"
            class="txt-box"
            placeholder="Password"
          />

          <a href="#">Forgot Password</a>

          <button>Login</button>
        </form>

        <p class="register-text">Not a member? <a href="#">Register Now</a></p>
      </div>
    </div>
  </body>
</html>
